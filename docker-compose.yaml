services:
  todoapp-postgres:
    image: postgres:18.3-bookworm
    container_name: todoapp-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${LOCAL_PATH}/out/pgdata:/var/lib/postgresql/data
    restart: always
